# RSS 订阅源配置模板（含来源策略）
# 复制为 feeds.yaml 后修改：cp feeds.example.yaml feeds.yaml
# feeds.yaml 不在版本控制中，修改后 docker compose restart 生效
#
# 策略字段说明：
#   tier: fast_news(24h)/vertical(48h)/deep(72h) — 决定有效期和过滤强度
#   retention_hours: 文章可参与推送的小时数
#   quality_weight: 来源质量权重，越高越优先
#   filter_profile: strict/standard/lenient — 相关性过滤强度

feeds:
  ai:
    - url: https://www.qbitai.com/feed
      source: qbitai
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://www.leiphone.com/feed
      source: leiphone
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://decemberpei.cyou/rssbox/wechat-jiqizhixin.xml
      source: jiqizhixin
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://tech.meituan.com/feed/
      source: meituan_tech
      tier: deep
      retention_hours: 72
      quality_weight: 4.0
      filter_profile: lenient
  tool:
