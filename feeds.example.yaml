      filter_profile: strict
    - url: https://www.appinn.com/feed
      source: appinn
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://blog.cloudflare.com/zh-cn/rss
      source: cloudflare_cn
      tier: deep
      retention_hours: 72
      quality_weight: 4.0
      filter_profile: lenient
  game:
    - url: https://www.yystv.cn/rss/feed
      source: yystv
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://www.gcores.com/rss
      source: gcores
      tier: deep
      retention_hours: 72
      quality_weight: 4.0
      filter_profile: lenient
    - url: https://www.chuapp.com/feed
      source: chuapp
      tier: deep
      retention_hours: 72
      quality_weight: 4.0
      filter_profile: lenient
    - url: https://indienova.com/feed/
      source: indienova
      tier: vertical
      retention_hours: 48
      quality_weight: 3.5
      filter_profile: standard
    - url: https://www.eurogamer.net/?format=rss
      source: eurogamer
      tier: fast_news
      retention_hours: 24
      quality_weight: 3.0
      filter_profile: strict

# relevance_rules 为可选的顶层配置，供相关性过滤组件使用（Task 4 接入）
relevance_rules: {}
